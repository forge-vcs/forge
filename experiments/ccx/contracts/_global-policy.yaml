# Global policy — included in EVERY brief, before any contract.
# Normative. Byte-stable: no timestamps, stable key order, stable list order.
schema: ccx.contract.v0
kind: global_policy
mechanics:
  build_system: cargo (single workspace; no Makefile/justfile)
  toolchain: rust 1.92.0 pinned via rust-toolchain.toml (rustfmt + clippy components)
  verify:                       # all three must pass before any task is done
    - cargo fmt --all --check
    - cargo test --workspace
    - cargo clippy --workspace --all-targets -- -D warnings
  layout: >
    Binary crate crates/forge-cli (binary name: forge). Library crates under
    crates/: forge-core (ID types), forge-store (SQLite persistence),
    forge-content (backend trait + secret-risk helpers), forge-content-git /
    forge-content-native (backends), forge-evidence (command capture),
    forge-policy (check evaluation), forge-protocol (JSON envelope),
    forge-export-git (Git export), forge-sync (native sync + peer transport).
    Integration tests: crates/forge-cli/tests/ (assert_cmd + tempfile).
rules:
  - Error handling is anyhow throughout; no custom error types.
  - Serde JSON uses rename_all = "snake_case"; the --json envelope carries
    schema_version "forge.cli.v0"; changes to serialized output are
    additive-only.
  - Conventional Commits (feat:/fix:/chore:/refactor:/docs: ...).
  - Rust files have a 3000-line ceiling (scripts/check-rust-line-count.sh).
  - Facade files (crates/forge-store/src/lib.rs, crates/forge-cli/src/main.rs)
    take no new domain behavior; new behavior lands in domain modules
    (docs/adr/0001-domain-modules.md).
security_defaults:  # do not weaken; weakening requires explicit human approval
  - Snapshots/exports exclude .forge, .env, .env.*, private-key files,
    credential paths.
  - Evidence excerpts are capped at 4096 bytes and redacted before storage.
  - Evidence, decisions, native accepted commits, sync merge commits carry
    local Ed25519 signatures; forge doctor verifies the tamper-evident chain.
unknown_rule: >
  If this brief plus the task contract does not license a decision you need
  to make, STOP and surface the unknown instead of guessing. Surfacing an
  unknown is a successful outcome, not a failure.
